server {
    listen 80 default_server;
    server_name localhost _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff";
        try_files /index.html =404;
    }

    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri $uri/ @root_files;
    }

    location @root_files {
        root /usr/share/nginx/root-files;
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri @spa;
    }

    location @spa {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff";
        try_files /index.html =404;
    }
}

server {
    listen 80;
    server_name ghosts.ccwu.cc;
    server_tokens off;

    return 301 https://ghosts.ccwu.cc$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name ghosts.ccwu.cc;
    server_tokens off;

    ssl_certificate /etc/nginx/certs/ghosts.ccwu.cc.pem;
    ssl_certificate_key /etc/nginx/certs/ghosts.ccwu.cc.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff";
        try_files /index.html =404;
    }

    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri $uri/ @root_files_https;
    }

    location @root_files_https {
        root /usr/share/nginx/root-files;
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri @spa_https;
    }

    location @spa_https {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff";
        try_files /index.html =404;
    }
}
